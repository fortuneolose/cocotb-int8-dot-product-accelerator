name: RTL smoke test

on:
  push:
  pull_request:

jobs:
  iverilog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install simulator
        run: sudo apt-get update && sudo apt-get install -y iverilog
      - name: Compile
        run: |
          mkdir -p build
          iverilog -g2012 -Wall -s tb_dot_product_int8_vivado \
            -o build/dot_product_int8_sim \
            rtl/dot_product_int8_vivado.v \
            tb/tb_dot_product_int8_vivado.sv
      - name: Run directed vectors
        run: |
          vvp build/dot_product_int8_sim | tee build/rtl-smoke.log
          grep -q "VIVADO RTL PASS" build/rtl-smoke.log
